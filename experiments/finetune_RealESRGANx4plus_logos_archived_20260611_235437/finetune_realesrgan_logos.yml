# GENERATE TIME: Thu Jun 11 05:24:45 2026
# CMD:
# scripts/train.py -opt configs/finetune_realesrgan_logos.yml

# =============================================================================
# Stage 2 — fine-tune RealESRGAN (GAN) on logos. Adds crisp, sharp detail via a
# U-Net discriminator + VGG perceptual loss. This is the VRAM-heavy stage.
#
# Launch (AFTER stage 1 has produced a net_g checkpoint):
#   python scripts/train.py --config configs/finetune_realesrgan_logos.yml
#
# IMPORTANT — set `pretrain_network_g` below to your STAGE-1 result, e.g.:
#   experiments/finetune_RealESRNetx4plus_logos/models/net_g_20000.pth
# (Falls back to the official RealESRGAN_x4plus.pth if you skip stage 1, but the
#  two-stage recipe gives noticeably cleaner logos.)
#
# 8 GB VRAM notes:
#   - GAN stage adds a discriminator + VGG, so batch is smaller: 4 @ gt_size 256.
#   - If you OOM: batch_size_per_gpu -> 2, then gt_size -> 192/128.
#   - queue_size 180 stays divisible by batch (180/4=45, 180/2=90).
# =============================================================================

name: finetune_RealESRGANx4plus_logos
model_type: RealESRGANModel
scale: 4
num_gpu: 1
manual_seed: 0

# USM sharpening of the GT (l1/percep on usm, gan on plain — Real-ESRGAN default)
l1_gt_usm: True
percep_gt_usm: True
gan_gt_usm: False

# ------------- on-the-fly degradation (same scheme as stage 1) -------------- #
resize_prob: [0.2, 0.7, 0.1]
resize_range: [0.15, 1.5]
gaussian_noise_prob: 0.5
noise_range: [1, 30]
poisson_scale_range: [0.05, 3]
gray_noise_prob: 0.4
jpeg_range: [30, 95]

second_blur_prob: 0.8
resize_prob2: [0.3, 0.4, 0.3]
resize_range2: [0.3, 1.2]
gaussian_noise_prob2: 0.5
noise_range2: [1, 25]
poisson_scale_range2: [0.05, 2.5]
gray_noise_prob2: 0.4
jpeg_range2: [30, 95]

gt_size: 256
queue_size: 180

datasets:
  train:
    name: logos
    type: RealESRGANDataset
    dataroot_gt: data/logos_hr_prepared
    meta_info: data/meta_info/meta_info_logos.txt
    io_backend:
      type: disk

    blur_kernel_size: 21
    kernel_list: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob: 0.1
    blur_sigma: [0.2, 3]
    betag_range: [0.5, 4]
    betap_range: [1, 2]

    blur_kernel_size2: 21
    kernel_list2: ['iso', 'aniso', 'generalized_iso', 'generalized_aniso', 'plateau_iso', 'plateau_aniso']
    kernel_prob2: [0.45, 0.25, 0.12, 0.03, 0.12, 0.03]
    sinc_prob2: 0.1
    blur_sigma2: [0.2, 1.5]
    betag_range2: [0.5, 4]
    betap_range2: [1, 2]

    final_sinc_prob: 0.8

    gt_size: 256
    use_hflip: True
    use_rot: False

    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

# ------------------------------ networks ------------------------------------ #
network_g:
  type: RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  num_grow_ch: 32

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64
  skip_connection: True

# ------------------------------- paths -------------------------------------- #
path:
  # >>> EDIT THIS to your stage-1 checkpoint for best results <<<
  pretrain_network_g: experiments/finetune_RealESRNetx4plus_logos/models/net_g_20000.pth
  param_key_g: params_ema
  strict_load_g: true
  # Discriminator can warm-start from the official GAN model (optional).
  pretrain_network_d: ~
  param_key_d: params
  strict_load_d: true
  resume_state: ~

# ------------------------------ training ------------------------------------ #
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [40000]
    gamma: 0.5

  total_iter: 20000
  warmup_iter: -1

  # ----- losses -----
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  # perceptual loss (VGG19 feature matching)
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1
      'conv3_4': 1
      'conv4_4': 1
      'conv5_4': 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1.0
    style_weight: 0
    range_norm: false
    criterion: l1
  # GAN loss
  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: !!float 1e-1

  net_d_iters: 1
  net_d_init_iters: 0

# ------------------------------ logging ------------------------------------- #
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 2e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

dist_params:
  backend: nccl
  port: 29500
